networks:
  proxy:
    external: true
    name: infra_proxy
  internal:
    external: true
    name: infra_internal
  app:
    driver: bridge

volumes:
  redis-data:

services:

  # ─────────────────────────────────────────
  # NGINX — Web Server (Traefik entry point)
  # ─────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: warehouseops-nginx
    restart: unless-stopped
    volumes:
      - ./:/var/www/html:ro
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
    networks:
      - proxy
      - app
    labels:
      - traefik.enable=true
      - traefik.http.routers.warehouseops.rule=Host(`warehouseops.thirdynals.org`)
      - traefik.http.routers.warehouseops.entrypoints=websecure
      - traefik.http.routers.warehouseops.tls.certresolver=cloudflare
      - traefik.http.services.warehouseops.loadbalancer.server.port=80
      - traefik.docker.network=infra_proxy

  # ─────────────────────────────────────────
  # APP — PHP-FPM
  # ─────────────────────────────────────────
  app:
    image: warehouseops-app:latest
    container_name: warehouseops-app
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - ./:/var/www/html
      - ./docker/app/php.ini:/usr/local/etc/php/conf.d/custom.ini
    environment:
      - APP_ENV=${APP_ENV:-production}
      - APP_DEBUG=${APP_DEBUG:-false}
      - APP_KEY=${APP_KEY}
      - APP_URL=${APP_URL:-https://warehouseops.thirdynals.org}
      - DB_CONNECTION=pgsql
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_DATABASE=${DB_DATABASE:-warehouseops}
      - DB_USERNAME=${DB_USERNAME:-devuser}
      - DB_PASSWORD=${DB_PASSWORD}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - CACHE_STORE=redis
      - QUEUE_CONNECTION=redis
      - SESSION_DRIVER=redis
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - app
      - internal

  # ─────────────────────────────────────────
  # HORIZON — Queue Worker
  # ─────────────────────────────────────────
  horizon:
    image: warehouseops-app:latest
    container_name: warehouseops-horizon
    restart: unless-stopped
    command: php artisan horizon
    working_dir: /var/www/html
    volumes:
      - ./:/var/www/html
    environment:
      - APP_ENV=${APP_ENV:-production}
      - APP_KEY=${APP_KEY}
      - DB_CONNECTION=pgsql
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_DATABASE=${DB_DATABASE:-warehouseops}
      - DB_USERNAME=${DB_USERNAME:-devuser}
      - DB_PASSWORD=${DB_PASSWORD}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - QUEUE_CONNECTION=redis
    depends_on:
      - app
      - redis
    networks:
      - app
      - internal

  # ─────────────────────────────────────────
  # SCHEDULER — Cron Runner
  # ─────────────────────────────────────────
  scheduler:
    image: warehouseops-app:latest
    container_name: warehouseops-scheduler
    restart: unless-stopped
    command: >
      sh -c "while true; do
        php artisan schedule:run --verbose --no-interaction;
        sleep 60;
      done"
    working_dir: /var/www/html
    volumes:
      - ./:/var/www/html
    environment:
      - APP_ENV=${APP_ENV:-production}
      - APP_KEY=${APP_KEY}
      - DB_CONNECTION=pgsql
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_DATABASE=${DB_DATABASE:-warehouseops}
      - DB_USERNAME=${DB_USERNAME:-devuser}
      - DB_PASSWORD=${DB_PASSWORD}
      - REDIS_HOST=redis
    depends_on:
      - app
    networks:
      - app
      - internal

  # ─────────────────────────────────────────
  # REDIS — Cache / Queue / Session
  # ─────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: warehouseops-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - app
