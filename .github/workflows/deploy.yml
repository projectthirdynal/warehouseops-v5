name: Deploy to Production

on:
  push:
    branches:
      - main

# Cancel any in-progress deploy if a new push arrives
concurrency:
  group: production-deploy
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy to Production
    runs-on: self-hosted
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install JS dependencies
        run: npm ci

      - name: Build frontend assets
        run: npm run build

      # Sync checked-out code + built assets to the live app directory.
      # Excludes .env (managed on server) and build artifacts managed by Docker.
      - name: Sync code to app directory
        run: |
          rsync -av --delete \
            --exclude='.env' \
            --exclude='.git/' \
            --exclude='node_modules/' \
            --exclude='vendor/' \
            --exclude='storage/app/' \
            --exclude='storage/logs/' \
            --exclude='storage/framework/' \
            ./ /opt/warehouseops/

      - name: Install Composer dependencies
        run: |
          sudo docker exec warehouseops-app composer install \
            --no-dev \
            --optimize-autoloader \
            --no-interaction

      - name: Run database migrations
        run: sudo docker exec warehouseops-app php artisan migrate --force

      - name: Rebuild Laravel caches
        run: |
          sudo docker exec warehouseops-app php artisan optimize:clear
          sudo docker exec warehouseops-app php artisan config:cache
          sudo docker exec warehouseops-app php artisan route:cache
          sudo docker exec warehouseops-app php artisan view:cache

      # Graceful horizon restart — picks up new code without dropping queued jobs
      - name: Restart Horizon worker
        run: |
          sudo docker exec warehouseops-app php artisan horizon:terminate || true

      - name: Health check
        run: |
          for container in warehouseops-app warehouseops-nginx warehouseops-redis; do
            status=$(sudo docker inspect --format='{{.State.Status}}' $container 2>/dev/null)
            if [ "$status" != "running" ]; then
              echo "FAIL: $container is $status"
              exit 1
            fi
          done
          echo "All containers running."
